[theme]
# Το βασικό χρώμα για ενεργά στοιχεία (κουμπιά, sliders)
primaryColor = "#0d47a1"

# Το σκούρο πράσινο χρώμα για το φόντο της αριστερής μπάρας (Sidebar)
sidebarBackgroundColor = "#0b3c26"

# Το χρώμα των γραμμάτων/εικονιδίων μέσα στην αριστερή μπάρα (λευκό για αντίθεση)
textColor = "#ffffff"

# Το κύριο φόντο της σελίδας σας (ανοιχτό/λευκό)
backgroundColor = "#ffffff"

# Το φόντο των δευτερευόντων στοιχείων (π.χ. containers/cards)
secondaryBackgroundColor = "#f8f9fa"

